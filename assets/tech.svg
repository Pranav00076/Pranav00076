
    <svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        
<defs>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.3">
            <animate attributeName="stop-color" values="#9d4edd;#00f2fe;#9d4edd" dur="5s" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f72585" stop-opacity="0.2">
            <animate attributeName="stop-color" values="#f72585;#4cc9f0;#f72585" dur="7s" repeatCount="indefinite" />
        </stop>
        <stop offset="100%" stop-color="#4cc9f0" stop-opacity="0.05" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="15" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
</defs>

        
<style>
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    @keyframes float-delay {
        0% { transform: translateY(0px); }
        50% { transform: translateY(10px); }
        100% { transform: translateY(0px); }
    }
    @keyframes pulse {
        0% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.7; transform: scale(1); }
    }
    .glass {
        fill: rgba(255, 255, 255, 0.04);
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1;
    }
    .glass-dark {
        fill: rgba(0, 0, 0, 0.4);
        stroke: rgba(255, 255, 255, 0.15);
        stroke-width: 1;
    }
    .text-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 58px;
        fill: #ffffff;
    }
    .text-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 600;
        font-size: 26px;
        fill: #e2e8f0;
    }
    .text-mono {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 16px;
        fill: #00ffcc;
    }
    .text-body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 15px;
        fill: #94a3b8;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    @keyframes reverse-rotate { 100% { transform: rotate(-360deg); } }
    @keyframes slide-right {
        0% { transform: translateX(0); opacity: 1; }
        20% { transform: translateX(0); opacity: 1; }
        25% { transform: translateX(50px); opacity: 0; }
        95% { transform: translateX(-50px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
    }
</style>

        <rect width="100%" height="100%" fill="#09090b" />
        <rect width="100%" height="100%" fill="url(#aurora2)" opacity="0.2" />
        
        <text x="500" y="60" class="text-title" font-size="36" text-anchor="middle" filter="url(#glow)">TECH ECOSYSTEM</text>
        
        <!-- Orbits -->
        <circle cx="500" cy="300" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="4 6" />
        <circle cx="500" cy="300" r="280" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
        
        <!-- AI Core -->
        <g transform="translate(500, 300)">
            <circle cx="0" cy="0" r="60" fill="url(#aurora1)" filter="url(#glow-heavy)" style="animation: pulse 3s infinite" />
            <circle cx="0" cy="0" r="45" fill="#09090b" />
            <text x="0" y="6" font-family="system-ui" font-weight="800" font-size="18" fill="#00ffcc" text-anchor="middle">AI CORE</text>
        </g>
        
        <g transform="translate(500,300)">
            <g style="animation: rotate 60s linear infinite">

                <g transform="translate(200.0, 0.0)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Python</text>
                    </g>
                </g>

                <g transform="translate(173.20508075688775, 99.99999999999999)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">TypeScript</text>
                    </g>
                </g>

                <g transform="translate(100.00000000000003, 173.20508075688772)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">React</text>
                    </g>
                </g>

                <g transform="translate(1.2246467991473532e-14, 200.0)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Next.js</text>
                    </g>
                </g>

                <g transform="translate(-99.99999999999997, 173.20508075688775)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Node.js</text>
                    </g>
                </g>

                <g transform="translate(-173.20508075688775, 99.99999999999999)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">LangChain</text>
                    </g>
                </g>

                <g transform="translate(-200.0, 2.4492935982947064e-14)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">OpenAI</text>
                    </g>
                </g>

                <g transform="translate(-173.20508075688772, -100.00000000000003)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Ollama</text>
                    </g>
                </g>

                <g transform="translate(-100.00000000000009, -173.20508075688767)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Docker</text>
                    </g>
                </g>

                <g transform="translate(-3.6739403974420595e-14, -200.0)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Supabase</text>
                    </g>
                </g>

                <g transform="translate(100.00000000000003, -173.20508075688772)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Firebase</text>
                    </g>
                </g>

                <g transform="translate(173.20508075688767, -100.00000000000009)">
                    <g style="animation: reverse-rotate 60s linear infinite">
                        <circle cx="0" cy="0" r="40" class="glass-dark" filter="url(#glow)" />
                        <text x="0" y="5" font-family="system-ui" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Tailwind</text>
                    </g>
                </g>

            </g>
        </g>
    </svg>
    